name: Tests

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'

  test:
    name: Test
    needs: changes
    # Run tests when source changes are detected, when manually dispatched,
    # or when a release tag (v*) is pushed. This ensures release-tag runs
    # execute the full test matrix instead of being skipped by the paths
    # filter.
    if: needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PATH: ./node_modules/.bin:$PATH

    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: task check-types

      - name: Lint
        run: task lint

      - name: Compile
        run: task compile

      - name: Run unit tests
        run: xvfb-run -a task unit-test-coverage -- --reporter=default --reporter=junit --outputFile=test-report.junit.xml
        env:
          CI: true

      - name: Run extension tests
        run: task extension-tests
        env:
          CI: true

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Start Ollama server
        run: ollama serve &
        shell: bash

      - name: Wait for Ollama server
        run: |
          sleep 5
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/version > /dev/null; then
              echo "Ollama server is running"
              exit 0
            fi
            echo "Waiting for Ollama server... ($i/30)"
            sleep 2
          done
          echo "Ollama server failed to start"
          exit 1
        shell: bash

      - name: Pull Ollama model
        run: ollama pull tinyllama
        shell: bash

      - name: Run integration tests
        run: task integration-tests
        env:
          CI: true
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-artifacts
          path: |
            out/
            dist/
            .vscode-test/
            coverage/
          retention-days: 7

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Upload extension bundle
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: extension-bundle
          path: dist/extension.js
          retention-days: 7

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [test]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          result="${{ needs.test.result }}"
          if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
            echo "❌ test job ${result}"
            exit 1
          fi
          echo "✅ All required CI jobs passed or were skipped."
